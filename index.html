<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>مجلس الحبايب - لوحة المتابعة</title>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;900&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
:root{
  --bg:#0d1117;--surface:#161b22;--surface2:#1e2530;--border:#2a3441;
  --gold:#c9a84c;--gold-dim:#8a6f2e;--gold-glow:rgba(201,168,76,.15);
  --green:#2ea44f;--green-bg:rgba(46,164,79,.12);
  --red:#f85149;--red-bg:rgba(248,81,73,.12);
  --text:#e6edf3;--muted:#7d8590;--teal:#39c5cf;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Tajawal',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;font-size:15px;}
.header{background:linear-gradient(135deg,#0d1117 0%,#161b22 50%,#1a1506 100%);border-bottom:1px solid var(--gold-dim);padding:20px 32px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;gap:16px;flex-wrap:wrap;}
.header-title{display:flex;align-items:center;gap:16px;}
.logo-icon{width:52px;height:52px;background:radial-gradient(circle at 30% 30%,var(--gold),var(--gold-dim));border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:26px;box-shadow:0 0 20px var(--gold-glow);flex-shrink:0;}
.header h1{font-size:24px;font-weight:900;color:var(--gold);line-height:1.1;}
.header .subtitle{font-size:11px;color:var(--muted);margin-top:2px;}
#file-time{font-size:10px;color:var(--muted);margin-top:3px;}
.header-right{display:flex;align-items:center;gap:12px;flex-wrap:wrap;}
.balance-badge{background:var(--green-bg);border:1px solid var(--green);border-radius:12px;padding:10px 20px;text-align:center;}
.balance-badge .lbl{font-size:11px;color:var(--muted);}
.balance-badge .amt{font-size:22px;font-weight:700;color:var(--green);direction:ltr;}
@keyframes spin{to{transform:rotate(360deg);}}
.sync-btn{font-family:'Tajawal',sans-serif;background:var(--gold-glow);border:1px solid var(--gold-dim);color:var(--gold);font-size:13px;font-weight:700;padding:10px 18px;border-radius:10px;cursor:pointer;display:flex;align-items:center;gap:8px;}
.sync-btn:hover{background:rgba(201,168,76,.25);}
.sync-btn.spinning svg{animation:spin .8s linear infinite;}
.tabs{display:flex;gap:4px;padding:16px 32px 0;border-bottom:1px solid var(--border);background:var(--surface);overflow-x:auto;}
.tab{padding:10px 22px;border-radius:8px 8px 0 0;border:1px solid transparent;border-bottom:none;font-family:'Tajawal',sans-serif;font-size:14px;font-weight:500;cursor:pointer;color:var(--muted);background:transparent;transition:all .2s;white-space:nowrap;}
.tab:hover{color:var(--text);background:var(--surface2);}
.tab.active{background:var(--bg);color:var(--gold);border-color:var(--border);border-bottom-color:var(--bg);margin-bottom:-1px;}
.main{padding:28px 32px;max-width:1200px;margin:0 auto;}
.panel{display:none;}.panel.active{display:block;}
#banner{font-size:12px;font-weight:600;padding:12px 16px;border-radius:8px;margin-bottom:20px;display:none;}
#banner.L{background:rgba(201,168,76,.1);border:1px solid var(--gold-dim);color:var(--gold);display:block;}
#banner.S{background:var(--green-bg);border:1px solid var(--green);color:var(--green);display:block;}
#banner.E{background:var(--red-bg);border:1px solid var(--red);color:var(--red);display:block;}
.cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:16px;margin-bottom:28px;}
.card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:18px 20px;}
.card .cl{font-size:12px;color:var(--muted);margin-bottom:8px;}
.card .cv{font-size:24px;font-weight:700;color:var(--text);direction:ltr;}
.card .cv.gold{color:var(--gold);}.card .cv.green{color:var(--green);}
.card .cv.red{color:var(--red);}.card .cv.teal{color:var(--teal);}
.lookup-box{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:24px;margin-bottom:28px;}
.lookup-box h3{font-size:15px;font-weight:700;color:var(--gold);margin-bottom:16px;}
.lookup-row{display:flex;gap:12px;flex-wrap:wrap;}
select,.fbtn{font-family:'Tajawal',sans-serif;font-size:14px;background:var(--surface2);border:1px solid var(--border);color:var(--text);border-radius:8px;padding:10px 14px;cursor:pointer;}
select{flex:1;min-width:180px;}
.fbtn{background:var(--gold-glow);border-color:var(--gold-dim);color:var(--gold);font-weight:600;padding:10px 20px;}
.fbtn:hover{background:rgba(201,168,76,.25);}
.mresult{margin-top:20px;display:none;}.mresult.show{display:block;}
.mbanner{font-size:18px;font-weight:700;color:var(--text);margin-bottom:14px;display:flex;align-items:center;gap:10px;flex-wrap:wrap;}
.mgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:10px;}
.mc{border-radius:10px;padding:12px 14px;border:1px solid;text-align:center;}
.mc.paid{background:var(--green-bg);border-color:var(--green);}
.mc.unpaid{background:var(--red-bg);border-color:var(--red);}
.mc .mn{font-size:13px;font-weight:600;}
.mc.paid .mn{color:var(--green);}.mc.unpaid .mn{color:var(--red);}
.mc .ma{font-size:18px;font-weight:700;margin:4px 0;direction:ltr;}
.mc.paid .ma{color:var(--text);}.mc.unpaid .ma{color:var(--muted);}
.mc .ms{font-size:11px;}
.mc.paid .ms{color:var(--green);}.mc.unpaid .ms{color:var(--red);}
.stitle{font-size:16px;font-weight:700;color:var(--gold);margin-bottom:14px;}
.twrap{background:var(--surface);border:1px solid var(--border);border-radius:12px;overflow:hidden;overflow-x:auto;}
table{width:100%;border-collapse:collapse;min-width:580px;}
thead{background:var(--surface2);}
th{padding:12px 16px;font-size:12px;font-weight:600;color:var(--muted);text-align:right;border-bottom:1px solid var(--border);white-space:nowrap;}
td{padding:11px 16px;font-size:14px;border-bottom:1px solid var(--border);}
tr:last-child td{border-bottom:none;}tbody tr:hover{background:rgba(255,255,255,.025);}
.badge{display:inline-flex;align-items:center;gap:5px;font-size:12px;font-weight:600;padding:4px 10px;border-radius:20px;}
.badge.paid{background:var(--green-bg);color:var(--green);border:1px solid var(--green);}
.badge.unpaid{background:var(--red-bg);color:var(--red);border:1px solid var(--red);}
.pills{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px;}
.pill{font-family:'Tajawal',sans-serif;font-size:13px;padding:6px 14px;border-radius:20px;border:1px solid var(--border);background:transparent;color:var(--muted);cursor:pointer;}
.pill:hover,.pill.active{border-color:var(--gold-dim);background:var(--gold-glow);color:var(--gold);}
.ain{color:var(--green);font-weight:600;}.aout{color:var(--red);}
.rb{font-size:12px;color:var(--muted);}
.pwrap{margin-top:6px;}
.pbar{height:5px;background:var(--border);border-radius:3px;overflow:hidden;}
.pfill{height:100%;background:linear-gradient(90deg,var(--gold-dim),var(--gold));border-radius:3px;}
.msg{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:14px;margin-bottom:28px;}
.msc{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:16px 18px;}
.msc h4{font-size:13px;color:var(--muted);margin-bottom:10px;}
.msc .msa{font-size:20px;font-weight:700;color:var(--text);direction:ltr;margin-bottom:8px;}
.msm{font-size:12px;color:var(--muted);}
@media(max-width:640px){.header{padding:16px;}.header h1{font-size:20px;}.tabs{padding:12px 16px 0;}.main{padding:20px 16px;}.balance-badge .amt{font-size:18px;}}
</style>
</head>
<body>

<div class="header">
  <div class="header-title">
    <div class="logo-icon">☕</div>
    <div>
      <h1>مجلس الحبايب</h1>
      <div class="subtitle">لوحة متابعة الاشتراكات والمصروفات</div>
      <div id="file-time">جاري التحقق من GitHub...</div>

    <button class="sync-btn" id="syncbtn">
      <svg id="syncico" xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
        <path d="M12 0c-6.626 0-12 5.373-12 12 0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.033-1.416-4.033-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23.957-.266 1.983-.399 3.003-.404 1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v3.293c0 .319.192.694.801.576 4.765-1.589 8.199-6.086 8.199-11.386 0-6.627-5.373-12-12-12z"/>

      مزامنة من GitHub

</div>

<div class="tabs">
  <button class="tab active" id="t1">🔍 وضع العضو</button>
  <button class="tab" id="t2">📋 كل الاشتراكات</button>

<div class="main">

  <div id="p1" class="panel active">
    <div class="cards" id="scards"></div>
    <div class="lookup-box">
      <h3>🔍 تحقق من وضع عضو</h3>

        <thead><tr><th>الشهر</th><th>الرقم</th><th>اسم المشارك</th><th>المبلغ (ر.س)</th><th>الحالة</th><th>تاريخ الدفع</th></tr></thead>

<script>
// ══════════════════════════════════════════════════════════
// CONFIG
// ══════════════════════════════════════════════════════════
const RAW_URL = 'https://raw.githubusercontent.com/hussainalmoghalliq2024/majlis/main/Habayib_Majlis_Expenses_2026.xlsx';
const API_URL = 'https://api.github.com/repos/hussainalmoghalliq2024/majlis/commits?path=Habayib_Majlis_Expenses_2026.xlsx&per_page=1';
const CACHE   = 'majlis_v5';

// Month labels: JS month index (0-based) + year → Arabic name
// Used to map datetime objects from the sheet
const AR_MONTHS = ['يناير','فبراير','مارس','أبريل','مايو','يونيو','يوليو','أغسطس','سبتمبر','أكتوبر','نوفمبر','ديسمبر'];

// Ordered month keys (YYYYMM integers) for display
const MONTH_KEYS = [202601,202602,202603,202604,202605,202606,202607,202608,202609,202610,202611,202612];
const MONTH_NAME = {};
MONTH_KEYS.forEach((k,i)=>{ MONTH_NAME[k]=AR_MONTHS[i]; });

// ══════════════════════════════════════════════════════════
// STATE
// ══════════════════════════════════════════════════════════
let payments=[], expenses=[], members=[];

// ══════════════════════════════════════════════════════════
// DATE UTILITIES
// SheetJS with cellDates:true returns JS Date objects for date cells.
// We use that and extract year/month/day directly.
// ══════════════════════════════════════════════════════════
function dateToKey(d){
  // d is a JS Date; returns YYYYMM integer e.g. 202601
  if(!d||!(d instanceof Date)||isNaN(d))return null;
  return d.getFullYear()*100 + (d.getMonth()+1);
}
function dateToStr(d){
  if(!d||!(d instanceof Date)||isNaN(d))return'—';
  return d.getDate()+' '+AR_MONTHS[d.getMonth()]+' '+d.getFullYear();
}
function strToDate(s){
  // handle "M/D/YYYY" strings that sometimes appear
  if(!s||typeof s!=='string')return null;
  const m=s.match(/^(\d{1,2})\/(\d{1,2})\/(\d{4})$/);
  if(m)return new Date(+m[3],+m[1]-1,+m[2]);
  return null;
}
function anyToDate(v){
  if(!v)return null;
  if(v instanceof Date)return isNaN(v)?null:v;
  if(typeof v==='string')return strToDate(v);
  return null;
}

// ══════════════════════════════════════════════════════════
// WORKBOOK PARSER
// Sheet structure confirmed from file:
//   Individual_Payments:
//     Header row index 4 (0-based): الشهر | عدد المشاركين | اسم المشارك | المبلغ | تم الدفع؟ | تاريخ الدفع
//     col[0]=month(Date) col[1]=no(num) col[2]=name col[3]=amount col[4]=status col[5]=paydate
//   General_Expenses:
//     Header row index 3: التاريخ | وصف المصروفات | المبلغ | ملاحظات
//     col[0]=date col[1]=desc col[2]=amount
// ══════════════════════════════════════════════════════════
function parseWorkbook(wb){
  payments=[]; expenses=[];

  // ── Individual_Payments ──────────────────
  const wsP = wb.Sheets['Individual_Payments'];
  if(wsP){
    // cellDates:true means date cells are JS Date objects
    const rows = XLSX.utils.sheet_to_json(wsP, {header:1, defval:null, raw:false});
    // Find header row containing 'اسم المشارك'
    let hi = rows.findIndex(r=>r&&r.some(c=>c&&String(c).includes('اسم المشارك')));
    if(hi<0) hi=4;

    for(let i=hi+1; i<rows.length; i++){
      const r = rows[i];
      if(!r||r.every(c=>c===null||c===undefined||c==='')) continue;

      // col[2] = name, col[1] = no, col[0] = month date, col[3] = amount, col[4] = status, col[5] = paydate
      const name   = r[2]!=null ? String(r[2]).trim() : '';
      if(!name) continue;

      const no     = r[1]!=null ? parseInt(r[1])||0 : 0;
      const status = r[4]!=null ? String(r[4]).trim() : '';
      const paid   = status === 'تم الدفع';

      // Amount: raw:false gives strings for numbers too, parse carefully
      let amount = 0;
      if(r[3]!==null && r[3]!==undefined && r[3]!==''){
        const n = parseFloat(String(r[3]).replace(/,/g,''));
        if(!isNaN(n)) amount = n;
      }

      // Month: col[0] is a date string like "1/1/2026" when raw:false
      // Parse to get YYYYMM key
      let monthKey = null;
      if(r[0]){
        // raw:false gives date as "M/D/YYYY" string
        const ds = strToDate(String(r[0]));
        if(ds) monthKey = dateToKey(ds);
        if(!monthKey){
          // try parsing as "YYYY-MM-DD" or similar
          const d2 = new Date(String(r[0]));
          if(!isNaN(d2)) monthKey = d2.getFullYear()*100+(d2.getMonth()+1);
        }
      }
      if(!monthKey) continue;

      // Payment date: col[5]
      let payDateStr = '—';
      if(paid && r[5]){
        const ds = strToDate(String(r[5]));
        if(ds) payDateStr = dateToStr(ds);
        else{
          const d2 = new Date(String(r[5]));
          if(!isNaN(d2)) payDateStr = dateToStr(d2);
        }
      }

      payments.push({ monthKey, no, name, amount: paid?amount:0, paid, payDateStr });
    }
  }

  // ── General_Expenses ─────────────────────
  const wsE = wb.Sheets['General_Expenses'];
  if(wsE){
    const rows = XLSX.utils.sheet_to_json(wsE, {header:1, defval:null, raw:false});
    // Find header row containing 'وصف المصروفات'
    let hi = rows.findIndex(r=>r&&r.some(c=>c&&String(c).includes('وصف')));
    if(hi<0) hi=3;

    for(let i=hi+1; i<rows.length; i++){
      const r = rows[i];
      if(!r||r.every(c=>c===null||c===undefined||c==='')) continue;
      // col[1]=desc, col[2]=amount
      const desc = r[1]!=null ? String(r[1]).trim() : '';
      if(!desc) continue;
      if(/إجمالي|مجموع|مبلغ العزبة/i.test(desc)) continue;
      // Amount: must be a real number string (skip formula strings like '=-8.5-25')
      let amount = null;
      if(r[2]!==null && r[2]!==undefined && r[2]!==''){
        const s = String(r[2]).trim();
        // reject formula strings
        if(!s.startsWith('=') && !s.startsWith('S')){
          const n = parseFloat(s.replace(/,/g,''));
          if(!isNaN(n)) amount = n;
        }
      }
      if(amount===null) continue;
      expenses.push({desc, amount});
    }
  }

  members = [...new Set(payments.map(p=>p.name))].sort();
}

// ══════════════════════════════════════════════════════════
// GITHUB FETCH
// ══════════════════════════════════════════════════════════
function setBanner(msg,cls){
  const el=document.getElementById('banner');
  el.innerHTML=msg; el.className=cls;
}

async function fetchLastCommit(){
  try{
    const r=await fetch(API_URL);
    if(r.ok){
      const c=await r.json();
      if(c&&c.length>0){
        const d=new Date(c[0].commit.committer.date);
        document.getElementById('file-time').innerHTML=
          'آخر تحديث: <span style="color:var(--gold)">'+
          d.toLocaleString('ar-SA',{year:'numeric',month:'long',day:'numeric',hour:'2-digit',minute:'2-digit',hour12:true})+'</span>';
      }
    }
  }catch(e){}
}

async function syncGitHub(){
  const btn=document.getElementById('syncbtn');
  btn.classList.add('spinning');
  setBanner('⏳ جاري تحميل البيانات من GitHub...','L');
  fetchLastCommit();
  try{
    const res=await fetch(RAW_URL);
    if(!res.ok) throw new Error('فشل الاتصال بـ GitHub — HTTP '+res.status);
    const buf=await res.arrayBuffer();
    // Use cellDates:true so date cells become JS Date objects
    const wb=XLSX.read(new Uint8Array(buf),{type:'array',cellDates:true,raw:false});
    parseWorkbook(wb);
    if(!payments.length && !expenses.length)
      throw new Error('تم تحميل الملف لكن لا توجد بيانات — تحقق من أسماء الشيتات');
    localStorage.setItem(CACHE,JSON.stringify({payments,expenses}));
    renderAll();
    setBanner('✓ تم التحميل بنجاح — '+payments.length+' دفعة | '+expenses.length+' مصروف — '+new Date().toLocaleTimeString('ar-SA'),'S');
  }catch(err){
    console.error(err);
    setBanner('❌ '+err.message,'E');
    const c=localStorage.getItem(CACHE);
    if(c){
      try{
        const d=JSON.parse(c);
        payments=d.payments||[]; expenses=d.expenses||[];
        members=[...new Set(payments.map(p=>p.name))].sort();
        renderAll();
        setBanner(document.getElementById('banner').innerHTML+'<br>⚠️ يتم عرض بيانات محفوظة محلياً.','E');
      }catch(e){}
    }
  }
  btn.classList.remove('spinning');
}

// ══════════════════════════════════════════════════════════
// TABS
// ══════════════════════════════════════════════════════════
document.getElementById('t1').addEventListener('click',function(){switchTab('p1',this);});
document.getElementById('t2').addEventListener('click',function(){switchTab('p2',this);});
document.getElementById('t3').addEventListener('click',function(){switchTab('p3',this);});
function switchTab(pid,btn){
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.getElementById(pid).classList.add('active');
  btn.classList.add('active');
}
document.getElementById('syncbtn').addEventListener('click',syncGitHub);
document.getElementById('showmbtn').addEventListener('click',showMember);

// ══════════════════════════════════════════════════════════
// RENDER
// ══════════════════════════════════════════════════════════
function bal(){return expenses.reduce((s,e)=>s+e.amount,0);}
function fmt2(n){return n.toLocaleString('ar',{minimumFractionDigits:2});}

function renderAll(){
  // Header balance
  document.getElementById('hbal').textContent=fmt2(bal())+' ر.س';

  // Summary cards
  const tc=payments.filter(p=>p.paid).reduce((s,p)=>s+p.amount,0);
  const te=expenses.filter(e=>e.amount<0).reduce((s,e)=>s+Math.abs(e.amount),0);
  const b=bal(), pc=payments.filter(p=>p.paid).length, ts=payments.length;
  const pct=ts>0?Math.round(pc/ts*100):0;
  document.getElementById('scards').innerHTML=`
    <div class="card">
      <div class="cl">إجمالي المحصّل</div>
      <div class="cv gold">${tc.toLocaleString('ar')} ر.س</div>
      <div class="pwrap">
        <div style="font-size:11px;color:var(--muted);margin-bottom:4px">${pc} من ${ts} دفعة (${pct}%)</div>
        <div class="pbar"><div class="pfill" style="width:${pct}%"></div></div>
      </div>
    </div>
    <div class="card"><div class="cl">إجمالي المصروفات</div><div class="cv red">${fmt2(te)} ر.س</div></div>
    <div class="card"><div class="cl">الرصيد المتاح</div><div class="cv green">${fmt2(b)} ر.س</div></div>
    <div class="card"><div class="cl">عدد الأعضاء</div><div class="cv teal">${members.length}</div></div>`;

  // Member select
  const sel=document.getElementById('msel');
  sel.innerHTML='<option value="">— اختر اسمك —</option>';
  members.forEach(m=>{const o=document.createElement('option');o.value=m;o.textContent=m;sel.appendChild(o);});

  // Payments pills & table
  renderPills();
  renderPayments('all');

  // Expenses
  renderExpenses();
}

function showMember(){
  const name=document.getElementById('msel').value; if(!name)return;
  const mp=[];
  for(const mk of MONTH_KEYS){
    const f=payments.find(p=>p.name===name&&p.monthKey===mk);
    if(f) mp.push(f);
    else if(payments.some(p=>p.monthKey===mk))
      mp.push({monthKey:mk,no:0,name,amount:0,paid:false,payDateStr:'—'});
  }
  const tp=mp.filter(p=>p.paid).reduce((s,p)=>s+p.amount,0);
  const pe=mp.filter(p=>!p.paid).length;
  document.getElementById('mbanner').innerHTML=
    `<span>${name}</span><span class="badge paid" style="font-size:13px">دفع ${tp} ر.س</span>`+
    (pe>0?`<span class="badge unpaid">${pe} شهر متأخر</span>`:'');
  document.getElementById('mgrid').innerHTML=mp.map(p=>`
    <div class="mc ${p.paid?'paid':'unpaid'}">
      <div class="mn">${MONTH_NAME[p.monthKey]}</div>
      <div class="ma">${p.paid?p.amount+' ر.س':'—'}</div>
      <div class="ms">${p.paid?'✓ تم الدفع':'✗ لم يتم الدفع'}</div>
      ${p.paid&&p.payDateStr&&p.payDateStr!=='—'?`<div style="font-size:10px;color:var(--muted);margin-top:4px">${p.payDateStr}</div>`:''}
    </div>`).join('');
  document.getElementById('mresult').classList.add('show');
}

function renderPills(){
  const mos=[...new Set(payments.map(p=>p.monthKey))].sort();
  document.getElementById('pills').innerHTML=
    `<button class="pill active" id="pill-all">الكل</button>`+
    mos.map(m=>`<button class="pill" id="pill-${m}">${MONTH_NAME[m]||m}</button>`).join('');
  document.getElementById('pill-all').addEventListener('click',function(){
    document.querySelectorAll('.pill').forEach(p=>p.classList.remove('active'));
    this.classList.add('active'); renderPayments('all');
  });
  mos.forEach(m=>{
    const b=document.getElementById('pill-'+m);
    if(b)b.addEventListener('click',function(){
      document.querySelectorAll('.pill').forEach(p=>p.classList.remove('active'));
      this.classList.add('active'); renderPayments(m);
    });
  });
}

function renderPayments(filter){
  const data=filter==='all'?payments:payments.filter(p=>p.monthKey==filter);
  document.getElementById('ptbody').innerHTML=data.map(p=>`<tr>
    <td>${MONTH_NAME[p.monthKey]||p.monthKey}</td>
    <td style="color:var(--muted)">${p.no}</td>
    <td>${p.name}</td>
    <td style="direction:ltr;text-align:right">${p.paid?p.amount+' ر.س':'—'}</td>
    <td>${p.paid?'<span class="badge paid">✓ تم الدفع</span>':'<span class="badge unpaid">✗ لم يتم الدفع</span>'}</td>
    <td style="font-size:12px;color:var(--muted)">${p.payDateStr||'—'}</td>
  </tr>`).join('');
}

function renderExpenses(){
  const ti=expenses.filter(e=>e.amount>0).reduce((s,e)=>s+e.amount,0);
  const to=expenses.filter(e=>e.amount<0).reduce((s,e)=>s+Math.abs(e.amount),0);
  const b=bal();
  document.getElementById('ecards').innerHTML=`
    <div class="card"><div class="cl">إجمالي الوارد</div><div class="cv green">${fmt2(ti)} ر.س</div></div>
    <div class="card"><div class="cl">إجمالي الصادر</div><div class="cv red">${fmt2(to)} ر.س</div></div>
    <div class="card"><div class="cl">الرصيد الحالي</div><div class="cv gold">${fmt2(b)} ر.س</div></div>`;

  const cbm={};
  for(const mk of MONTH_KEYS){
    const v=payments.filter(p=>p.monthKey===mk&&p.paid).reduce((s,p)=>s+p.amount,0);
    if(v>0)cbm[MONTH_NAME[mk]]=v;
  }
  document.getElementById('msg').innerHTML=Object.entries(cbm).map(([mo,v])=>
    `<div class="msc"><h4>${mo}</h4><div class="msa">${v} ر.س</div><div class="msm">محصّل من الأعضاء</div></div>`).join('');

  let run=0;
  document.getElementById('etbody').innerHTML=expenses.map(e=>{
    run+=e.amount;
    const isIn=e.amount>0;
    return`<tr>
      <td>${e.desc}</td>
      <td>${isIn?'<span class="badge paid">وارد</span>':'<span class="badge unpaid">مصروف</span>'}</td>
      <td>${isIn?`<span class="ain">+${fmt2(e.amount)}</span>`:`<span class="aout">${fmt2(e.amount)}</span>`}</td>
      <td><span class="rb">${fmt2(run)} ر.س</span></td>
    </tr>`;
  }).join('');
}
